<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Rotate Tools</title>
  <style>
    body { font-family: sans-serif; padding: 10px; width: 200px; }
    button { width: 100%; margin: 5px 0; padding: 8px; }
  </style>
</head>
<body>
  <h3>Rotate Tools</h3>

  <button onclick="rotateSelected(-15)">Rotate -15°</button>
  <button onclick="rotateSelected(15)">Rotate +15°</button>
  <button onclick="resetRotation()">Reset</button>

  <script src="./main.js"></script>
</body>
</html>
